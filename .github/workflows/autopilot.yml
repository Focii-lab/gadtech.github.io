name: Automated AI Content Deploy

# Ensures only one deployment job runs at a time
concurrency:
  group: content-deploy
  cancel-in-progress: false

on:
  schedule:
    # Runs at 15 minutes past every 8th hour
    - cron: '15 */8 * * *'
  # We removed the "push" trigger entirely!
  # workflow_dispatch allows you to click a button to run it manually if you ever want to.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install google-genai
      - name: Run Automator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automator.py
      - name: Deploy
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "System generated new waterfall content"
          git push
