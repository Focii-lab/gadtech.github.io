name: Automated AI Content Deploy

on:
  schedule:
    # Runs at 15 minutes past every 3rd hour
    - cron: '15 */3 * * *'
  push:
    branches:
      - main
    # Prevents infinite loops when you update static files
    paths-ignore:
      - 'about.html'
      - 'README.md'
      - 'past_topics.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run Automator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automator.py

      - name: Deploy
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "System generated new waterfall content"
          git push
